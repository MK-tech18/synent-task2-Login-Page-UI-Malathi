<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Dashboard</h1>
        <p class="sub">You are successfully logged in.</p>

        <div class="panel">
          <p><strong>User:</strong> <span id="userEmail">—</span></p>
        </div>

        <button class="btn" type="button" onclick="Auth.logout()">Logout</button>
      </section>
    </main>

    <script src="auth.js"></script>
    <script>
      Auth.guard();
      document.getElementById("userEmail").textContent = Auth.currentUserEmail() || "—";
    </script>
  </body>
</html>
