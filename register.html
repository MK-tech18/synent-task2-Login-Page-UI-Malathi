<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Create account</h1>
        <p class="sub">Register once. Then you can login.</p>

        <form id="registerForm" class="form" autocomplete="on" novalidate>
          <label class="field">
            <span>Email</span>
            <input id="regEmail" type="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="regPassword" type="password" placeholder="Create a password" required minlength="6" />
          </label>

          <label class="field">
            <span>Confirm Password</span>
            <input id="regConfirm" type="password" placeholder="Re-enter password" required minlength="6" />
          </label>

          <p id="regMsg" class="msg" role="status" aria-live="polite"></p>

          <button class="btn primary" type="submit">Register</button>

          <p class="hint">
            Already have an account?
            <a href="index.html">Login</a>
          </p>
        </form>
      </section>
    </main>

    <script src="auth.js"></script>
    <script>
      Auth.registerPage();
    </script>
  </body>
</html>
